# docker-compose.yml
services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cv-maker-frontend
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true # Helps with hot-reload in some Docker environments
